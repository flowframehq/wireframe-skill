<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>역할 변경</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://kxyhbeykjlphcifhbbkr.supabase.co/storage/v1/object/public/wireframes/shared/ff-platform.js"></script>

  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>

  <!-- @META -->
  <script type="application/json" id="flowframe-meta">
  {
    "generator": "flowframe-wireframe-skill",
    "version": "2.0",
    "type": "modal",
    "screenId": "MEMBER-MANAGE",
    "modalId": "role-change",
    "title": "역할 변경",
    "purpose": "회원 역할을 부여하거나 해제할 때 변경할 역할을 선택하고 확인하는 모달",
    "features": [
      {
        "featureId": "MEMBER",
        "label": "회원 관리",
        "features": [
          {
            "featureId": "MEMBER__MEMBER_ROLE",
            "label": "역할 변경",
            "elements": [
              { "id": "CURRENT_ROLE", "type": "text", "label": "현재 역할", "description": "변경 대상 회원의 현재 역할을 표시하는 텍스트" },
              { "id": "TARGET_ROLE", "type": "select", "label": "변경할 역할", "description": "관리자/일반/VIP 중 변경할 역할을 선택하는 드롭다운" },
              { "id": "CONFIRM", "type": "button", "label": "확인 버튼", "description": "역할 변경을 확정하는 실행 버튼" },
              { "id": "CANCEL", "type": "button", "label": "취소 버튼", "description": "역할 변경을 취소하고 모달을 닫는 버튼" }
            ]
          }
        ]
      }
    ]
  }
  </script>
  <!-- @END:META -->
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 p-8 flex items-center justify-center min-h-screen">
  <div class="w-[440px] rounded-xl border border-zinc-200 bg-white p-6 shadow-sm dark:border-zinc-700 dark:bg-zinc-900">

    <!-- @SLOT:modal:role-change -->
    <div data-feature="MEMBER" data-label="회원 관리">
      <div data-feature="MEMBER__MEMBER_ROLE" data-label="역할 변경">

        <div data-state="기본">
          <h2 class="text-base font-semibold text-zinc-800 dark:text-zinc-200 mb-4">역할 변경</h2>

          <div class="flex flex-col gap-4">
            <!-- 현재 역할 -->
            <div data-el="CURRENT_ROLE">
              <div class="text-xs text-zinc-400 mb-1">현재 역할</div>
              <div class="flex items-center gap-2">
                <span class="text-sm text-zinc-700 dark:text-zinc-300">김철수</span>
                <span class="rounded-full bg-zinc-100 px-2 py-0.5 text-[11px] text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400">일반</span>
              </div>
            </div>

            <!-- 변경할 역할 -->
            <div class="flex flex-col gap-1.5" data-el="TARGET_ROLE">
              <label class="text-xs font-medium text-zinc-500 dark:text-zinc-400">변경할 역할</label>
              <select class="h-9 w-full rounded-md border border-zinc-200 bg-transparent px-3 text-sm dark:border-zinc-700" disabled>
                <option>VIP</option>
                <option>관리자</option>
                <option>일반</option>
              </select>
            </div>
          </div>

          <!-- 버튼 -->
          <div class="flex gap-2 mt-5">
            <button class="h-9 flex-1 rounded-md border border-zinc-300 text-sm font-medium text-zinc-600 dark:border-zinc-600 dark:text-zinc-400" data-el="CANCEL">취소</button>
            <button class="h-9 flex-1 rounded-md bg-zinc-800 text-sm font-medium text-white dark:bg-zinc-200 dark:text-zinc-900" data-el="CONFIRM">확인</button>
          </div>
        </div>

      </div>
    </div>
    <!-- @END:modal:role-change -->

  </div>
</body>
</html>
